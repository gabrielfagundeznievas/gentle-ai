name: Update AUR Package

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.4.1)'
        required: false
        default: ''

jobs:
  update-aur:
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || github.ref == 'refs/heads/main'
    steps:
      - name: Validate branch for workflow_dispatch
        if: github.event_name == 'workflow_dispatch' && github.ref != 'refs/heads/main'
        run: |
          echo "Error: workflow_dispatch can only be triggered from the main branch"
          exit 1

      - name: Get release info
        id: release
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(curl -s https://api.github.com/repos/Gentleman-Programming/gentle-ai/releases/latest | jq -r .tag_name | sed 's/v//')
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download checksums
        run: |
          curl -sL "https://github.com/Gentleman-Programming/gentle-ai/releases/download/v${{ steps.release.outputs.version }}/checksums.txt" -o /tmp/checksums.txt
          cat /tmp/checksums.txt

      - name: Extract checksums
        id: checksums
        run: |
          AMD64_HASH=$(grep "gentle-ai_${{ steps.release.outputs.version }}_linux_amd64.tar.gz" /tmp/checksums.txt | awk '{print $1}')
          ARM64_HASH=$(grep "gentle-ai_${{ steps.release.outputs.version }}_linux_arm64.tar.gz" /tmp/checksums.txt | awk '{print $1}')
          echo "amd64_hash=$AMD64_HASH" >> $GITHUB_OUTPUT
          echo "arm64_hash=$ARM64_HASH" >> $GITHUB_OUTPUT

      - name: Generate LICENSE
        run: |
          cat > /tmp/LICENSE << 'LICENSEEOF'
          MIT License
          
          Copyright (c) 2024 Gentleman Programming
          
          Permission is hereby granted, free of charge, to any person obtaining a copy
          of this software and associated documentation files (the "Software"), to deal
          in the Software without restriction, including without limitation the rights
          to use, copy, modify, merge, publish, distribute, sublicense, and/or sell
          copies of the Software, and to permit persons to whom the Software is
          furnished to do so, subject to the following conditions:
          
          The above copyright notice and this permission notice shall be included in all
          copies or substantial portions of the Software.
          
          THE SOFTWARE IS PROVIDED "AS IS", WITHOUT WARRANTY OF ANY KIND, EXPRESS OR
          IMPLIED, INCLUDING BUT NOT LIMITED TO THE WARRANTIES OF MERCHANTABILITY,
          FITNESS FOR A PARTICULAR PURPOSE AND NONINFRINGEMENT. IN NO EVENT SHALL THE
          AUTHORS OR COPYRIGHT HOLDERS BE LIABLE FOR ANY CLAIM, DAMAGES OR OTHER
          LIABILITY, WHETHER IN AN ACTION OF CONTRACT, TORT OR OTHERWISE, ARISING FROM,
          OUT OF OR IN CONNECTION WITH THE SOFTWARE OR THE USE OR OTHER DEALINGS IN THE
          SOFTWARE.
          LICENSEEOF
          cat /tmp/LICENSE

      - name: Generate PKGBUILD
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          AMD64_HASH="${{ steps.checksums.outputs.amd64_hash }}"
          ARM64_HASH="${{ steps.checksums.outputs.arm64_hash }}"
          LICENSE_HASH=$(sha256sum /tmp/LICENSE | awk '{print $1}')
          
          cat > /tmp/PKGBUILD << PKGEOF
          # Maintainer: Gentleman Programming <info@gentlemanprogramming.dev>
          # Contributor: Gabriel Fagundez <gabrielfagundeznievas@gmail.com>
          
          pkgname=gentle-ai
          pkgver=$VERSION
          pkgrel=1
          pkgdesc="AI Gentle Stack - Ecosystem configurator for AI coding agents"
          arch=('x86_64' 'aarch64')
          url="https://github.com/Gentleman-Programming/gentle-ai"
          license=('MIT')
          provides=('gentle-ai')
          conflicts=('gentle-ai')
          
          source=("LICENSE")
          source_x86_64=("gentle-ai_${VERSION}_linux_amd64.tar.gz::https://github.com/Gentleman-Programming/gentle-ai/releases/download/v${VERSION}/gentle-ai_${VERSION}_linux_amd64.tar.gz")
          source_aarch64=("gentle-ai_${VERSION}_linux_arm64.tar.gz::https://github.com/Gentleman-Programming/gentle-ai/releases/download/v${VERSION}/gentle-ai_${VERSION}_linux_arm64.tar.gz")
          
          sha256sums=('$LICENSE_HASH')
          sha256sums_x86_64=('$AMD64_HASH')
          sha256sums_aarch64=('$ARM64_HASH')
          
          package() {
            install -Dm755 gentle-ai "\${pkgdir}/usr/bin/gentle-ai"
            install -Dm644 LICENSE "\${pkgdir}/usr/share/licenses/gentle-ai/LICENSE"
          }
          PKGEOF
          cat /tmp/PKGBUILD

      - name: Generate .SRCINFO
        run: |
          LICENSE_HASH=$(sha256sum /tmp/LICENSE | awk '{print $1}')
          cat > /tmp/.SRCINFO << EOF
          pkgbase = gentle-ai
              pkgdesc = AI Gentle Stack - Ecosystem configurator for AI coding agents
              pkgver = ${{ steps.release.outputs.version }}
              pkgrel = 1
              url = https://github.com/Gentleman-Programming/gentle-ai
              license = MIT
              arch = x86_64
              arch = aarch64
              provides = gentle-ai
              conflicts = gentle-ai
              source = LICENSE
              sha256sums = $LICENSE_HASH
              source_x86_64 = gentle-ai_${{ steps.release.outputs.version }}_linux_amd64.tar.gz::https://github.com/Gentleman-Programming/gentle-ai/releases/download/v${{ steps.release.outputs.version }}/gentle-ai_${{ steps.release.outputs.version }}_linux_amd64.tar.gz
              sha256sums_x86_64 = ${{ steps.checksums.outputs.amd64_hash }}
              source_aarch64 = gentle-ai_${{ steps.release.outputs.version }}_linux_arm64.tar.gz::https://github.com/Gentleman-Programming/gentle-ai/releases/download/v${{ steps.release.outputs.version }}/gentle-ai_${{ steps.release.outputs.version }}_linux_arm64.tar.gz
              sha256sums_aarch64 = ${{ steps.checksums.outputs.arm64_hash }}
          
          pkgname = gentle-ai
          EOF
          cat /tmp/.SRCINFO

      - name: Commit and push to AUR
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          git config --global user.name "gentle-ai[bot]"
          git config --global user.email "info@gentlemanprogramming.dev"
          
          mkdir -p ~/.ssh
          echo "$AUR_SSH_KEY" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H aur.archlinux.org >> ~/.ssh/known_hosts
          
          # Clone AUR repo
          git clone ssh://aur@aur.archlinux.org/gentle-ai.git /tmp/aur
          cd /tmp/aur
          
          # Copy generated files
          cp /tmp/PKGBUILD .
          cp /tmp/LICENSE .
          cp /tmp/.SRCINFO .
          
          # Commit and push
          git add PKGBUILD LICENSE .SRCINFO
          git commit -m "Update to v${{ steps.release.outputs.version }}" || echo "No changes to commit"
          git push origin master